<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="applicationTitle" value="Battery" />
<meta name="windowSize" value="200 80" />
<meta name="windowLocation" value="0 0" />
<meta name="windowBorderRadius" value="12" />
<meta name="topMost" value="false">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  :root {
    --mica-dark: rgba(20, 20, 20, 0.75);
    --text-color: #f0f0f0;
    --low-battery: #E81123;
    --radius: 20px;
    --backdrop-blur: 40px;
    --font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, sans-serif;
  }

  html, body {
    height: 100%;
    width: 100%;
    margin: 0;
    background: transparent; /* host/manager background shows through */
  }

  /* center the widget area in the available window */
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-family);
    color: var(--text-color);
    overflow: hidden;
  }

  /* the actual widget — has the mica background + blur, rounded corners */
  .widget {
    width: 100%;   /* match windowSize width */
    height: 100%;  /* match windowSize height */
    background: var(--mica-dark);
    backdrop-filter: blur(var(--backdrop-blur)) saturate(150%) brightness(0.95);
    -webkit-backdrop-filter: blur(var(--backdrop-blur)) saturate(150%) brightness(0.95);
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.04);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    box-sizing: border-box;
    padding: 1rem;
  }

  .battery-icon {
    font-size: 1.6em;
    line-height: 1;
  }

  .percentage {
    font-size: 1.05em;
    font-weight: 600;
    color: var(--text-color);
  }

  .low {
    color: var(--low-battery);
  }
</style>
</head>

<body role="region" aria-label="Battery Widget">
  <div class="widget" id="widget">
    <i class="fa-solid fa-battery-full battery-icon" id="battery-icon" aria-hidden="true"></i>
    <div class="percentage" id="battery-percent">--%</div>
  </div>

  <script>
    const batteryIcon = document.getElementById('battery-icon');
    const batteryPercent = document.getElementById('battery-percent');

    async function updateBattery() {
      if (!navigator.getBattery) {
        batteryIcon.className = "fa-solid fa-battery-empty battery-icon";
        batteryPercent.textContent = 'N/A';
        return;
      }

      const battery = await navigator.getBattery();

      function refresh() {
        const level = battery.level;
        const charging = battery.charging;
        const percent = Math.round(level * 100);

        // reset classes (preserve battery-icon baseline class)
        batteryIcon.className = 'fa-solid battery-icon';

        if (charging) {
          batteryIcon.classList.add('fa-battery-full');
        } else if (level <= 0.2) {
          batteryIcon.classList.add('fa-battery-quarter');
          batteryPercent.classList.add('low');
        } else if (level <= 0.4) {
          batteryIcon.classList.add('fa-battery-quarter');
          batteryPercent.classList.remove('low');
        } else if (level <= 0.6) {
          batteryIcon.classList.add('fa-battery-half');
          batteryPercent.classList.remove('low');
        } else if (level <= 0.8) {
          batteryIcon.classList.add('fa-battery-three-quarters');
          batteryPercent.classList.remove('low');
        } else {
          batteryIcon.classList.add('fa-battery-full');
          batteryPercent.classList.remove('low');
        }

        batteryPercent.textContent = `${percent}%`;
        if (!charging && percent <= 20) {
          batteryPercent.classList.add('low');
        } else {
          batteryPercent.classList.remove('low');
        }
      }

      refresh();
      battery.addEventListener('levelchange', refresh);
      battery.addEventListener('chargingchange', refresh);
    }

    updateBattery();
  </script>
</body>
</html>
