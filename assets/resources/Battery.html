<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="applicationTitle" content="Battery">
  <meta name="windowSize" content="200 120">
  <meta name="windowLocation" content="0 0">
  <title>Battery Widget</title>

  <!-- Font Awesome 6 Free (CDN) -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer" />

  <!-- Preferred UI font for desktop widgets -->
  <style>
    @font-face {
      font-family: "Segoe UI";
      src: local("Segoe UI"), local("SegoeUI"), local("Segoe UI Variable");
      font-weight: 400;
      font-style: normal;
    }

    :root {
      /* Windows 11 dark mode palette */
      --bg-color: rgba(32, 32, 32, 0.95);   /* #202020 with slight transparency */
      --border-color: #2A2A2A;            /* slightly lighter than background */
      --hover-border: #0078D7;            /* Windows logo blue */
      --text-color: #FFFFFF;              /* white text */
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-color);
      font-family: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif; overflow: hidden;
    }

    #widget {
      width: 100%;
      height: 100%;
      max-width: 200px;
      max-height: 120px;
      border: 2px solid var(--border-color);
      border-radius: var(--windowBorderRadius, 12px);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: var(--bg-color);
      transition: border-color 0.2s ease;
    }

    #widget:hover {
      border-color: var(--hover-border);
    }

    #icon {
      font-size: 2rem;
    }

    #level {
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div id="widget">
    <i id="icon" class="fa-solid fa-battery-full"></i>
    <div id="level">--%</div>
  </div>

  <script>
    async function initBattery() {
      if (!navigator.getBattery) {
        document.getElementById('level').textContent = 'Unsupported';
        return;
      }

      const battery = await navigator.getBattery();

      function updateUI() {
        const pct = Math.round(battery.level * 100);
        document.getElementById('level').textContent = `${pct}%`;

        // Choose Font Awesome battery icon based on charge level
        let iconClass = 'fa-battery-empty';
        if (pct > 80) iconClass = 'fa-battery-full';
        else if (pct > 60) iconClass = 'fa-battery-three-quarters';
        else if (pct > 40) iconClass = 'fa-battery-half';
        else if (pct > 20) iconClass = 'fa-battery-quarter';

        const iconEl = document.getElementById('icon');
        iconEl.className = `fa-solid ${iconClass}`;
      }

      updateUI();
      battery.addEventListener('levelchange', updateUI);
      battery.addEventListener('chargingchange', updateUI);
    }

    initBattery();
  </script>
</body>
</html>
