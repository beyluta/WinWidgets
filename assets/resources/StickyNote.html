<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="applicationTitle" value="Sticky Note" />
<meta name="windowSize" value="350 350" />
<meta name="windowLocation" value="0 0" />
<meta name="windowBorderRadius" value="12" />
<meta name="topMost" value="true">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  :root {
    --mica-dark: rgba(30, 30, 30, 0.75);
    --text-color: #f0f0f0;
    --radius: 12px;
    --shadow: 0 12px 16px rgba(0,0,0,0.45);
    --backdrop-blur: 60px;
    --font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, sans-serif;
    --tab-bg: rgba(255,255,255,0.08);
    --tab-active-bg: rgba(255,255,255,0.15);
    --scrollbar-color: rgba(255,255,255,0.3);
    --scrollbar-hover: rgba(255,255,255,0.5);
  }

  body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: transparent;
    font-family: var(--font-family);
    overflow: hidden;
  }

  .wrapper {
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .note {
    position: relative;
    background: var(--mica-dark);
    backdrop-filter: blur(var(--backdrop-blur)) saturate(160%) brightness(0.9);
    -webkit-backdrop-filter: blur(var(--backdrop-blur)) saturate(160%) brightness(0.9);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px 24px;
    width: 260px;
    height: 260px;
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(255,255,255,0.05);
    color: var(--text-color);
  }

  .edit-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50%;
    width: 28px;
    height: 28px;
    color: var(--text-color);
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background 0.2s, transform 0.1s;
    font-size: 0.9em;
    position: absolute;
    top: 8px;
    right: 8px;
  }

  .edit-btn:hover { background: rgba(255,255,255,0.15); }
  .edit-btn:active { transform: scale(0.95); }

  .tab-header {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
    overflow-x: auto;
    padding-right: 36px;
  }

  /* Horizontal scrollbar (MacOS style) */
  .tab-header::-webkit-scrollbar {
    height: 6px;
  }
  .tab-header::-webkit-scrollbar-track { background: transparent; }
  .tab-header::-webkit-scrollbar-thumb {
    background-color: var(--scrollbar-color);
    border-radius: 3px;
    transition: background 0.2s;
  }
  .tab-header::-webkit-scrollbar-thumb:hover { background-color: var(--scrollbar-hover); }

  .tab {
    flex: none;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 8px;
    cursor: pointer;
    background: var(--tab-bg);
    border-radius: var(--radius);
    transition: background 0.2s;
    font-weight: 500;
    font-size: 0.9em;
    white-space: nowrap;
  }

  .tab.active { background: var(--tab-active-bg); }

  .close-tab {
    font-size: 0.8em;
    cursor: pointer;
    color: rgba(240,240,240,0.7);
  }

  .tab-contents {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    min-height: 0;
    height: 100%;
  }

  .tab-content {
    flex: 1 1 auto;
    display: none;
    flex-direction: column;
    min-height: 0;
    height: 100%;
  }
  .tab-content.active { display: flex; }

  textarea {
    flex: 1 1 auto;
    width: 100%;
    min-height: 0;
    max-height: 100%;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    color: var(--text-color);
    font-family: var(--font-family);
    font-size: 1em;
    overflow-y: auto;
  }

  /* Vertical scrollbar for textareas (MacOS style) */
  textarea::-webkit-scrollbar {
    width: 6px;
  }
  textarea::-webkit-scrollbar-track { background: transparent; }
  textarea::-webkit-scrollbar-thumb {
    background-color: var(--scrollbar-color);
    border-radius: 3px;
    transition: background 0.2s;
  }
  textarea::-webkit-scrollbar-thumb:hover { background-color: var(--scrollbar-hover); }
</style>
</head>

<body>
<div class="wrapper">
  <div class="note" role="region" aria-label="Dynamic Tabbed Sticky Note">
    <button class="edit-btn" title="New Tab"><i class="fa-solid fa-plus"></i></button>
    <div class="tab-header"></div>
    <div class="tab-contents"></div>
  </div>
</div>

<script>
  const note = document.querySelector('.note');
  const editBtn = document.querySelector('.edit-btn');
  const tabHeader = document.querySelector('.tab-header');
  const tabContents = document.querySelector('.tab-contents');

  let tabCount = 0;

  function updateCloseButtons() {
    const tabs = tabHeader.querySelectorAll('.tab');
    tabs.forEach(t => {
      const closeBtn = t.querySelector('.close-tab');
      if (tabs.length <= 1) {
        if (closeBtn) closeBtn.style.display = 'none';
      } else {
        if (closeBtn) closeBtn.style.display = 'inline';
      }
    });
  }

  function createTab() {
    tabCount++;
    const tabId = `tab-${tabCount}`;

    const tab = document.createElement('div');
    tab.classList.add('tab', 'active');
    tab.dataset.tab = tabId;
    tab.textContent = `Note ${tabCount}`;

    const closeBtn = document.createElement('span');
    closeBtn.classList.add('close-tab');
    closeBtn.innerHTML = '&times;';
    tab.appendChild(closeBtn);

    tabHeader.prepend(tab);

    const content = document.createElement('div');
    content.classList.add('tab-content', 'active');
    content.id = tabId;
    const textarea = document.createElement('textarea');
    textarea.placeholder = `Write your note ${tabCount} here...`;
    content.appendChild(textarea);
    tabContents.prepend(content);

    tabHeader.querySelectorAll('.tab').forEach(t => {
      if (t !== tab) t.classList.remove('active');
    });
    tabContents.querySelectorAll('.tab-content').forEach(c => {
      if (c !== content) c.classList.remove('active');
    });

    tab.addEventListener('click', e => {
      if (e.target === closeBtn) return;
      tabHeader.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      tabContents.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      content.classList.add('active');
    });

    closeBtn.addEventListener('click', e => {
      e.stopPropagation();
      const isActive = tab.classList.contains('active');
      tab.remove();
      content.remove();
      updateCloseButtons();
      if (isActive) {
        const firstTab = tabHeader.querySelector('.tab');
        if (firstTab) firstTab.click();
      }
    });

    updateCloseButtons();
  }

  editBtn.addEventListener('click', createTab);

  createTab();
</script>
</body>
</html>
