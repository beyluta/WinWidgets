<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="applicationTitle" content="Mini Calendar">
  <meta name="windowSize" content="320 120">
  <meta name="windowLocation" content="0 0">
  <title>Mini Calendar</title>

  <!-- Font Awesome for arrows -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

  <style>
    @font-face {
      font-family: "Segoe UI";
      src: local("Segoe UI"), local("SegoeUI"), local("Segoe UI Variable");
    }

    :root {
      --bg-color:    rgba(32, 32, 32, 0.95);
      --border-color:#2A2A2A;
      --hover-border:#0078D7;
      --text-color:  #FFFFFF;
      --today-bg:#004080;   /* blue‑ish background for the real today */
    }

    html, body { height:100%; margin:0; padding:0; }
    body {
      overflow: hidden;
      display:flex; align-items:center; justify-content:center;
      color:var(--text-color);
      font-family:"Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
    }
    #widget {
      width:100%; height:100%;
      max-width:320px; max-height:120px;
      border:2px solid var(--border-color);
      border-radius:var(--windowBorderRadius,12px);
      box-sizing:border-box;
      background:var(--bg-color);
      display:flex; align-items:center; justify-content:center;
      gap:0.8rem;
      transition:border-color .2s ease;
    }
    #widget:hover { border-color:var(--hover-border); }

    .nav { cursor:pointer; opacity:0.6; font-size:1.4rem; }
    .nav:hover { opacity:1; }

    .day-box {
      text-align:center;
      min-width:70px;
      padding:0.4rem 0;
      border-radius:4px;
    }
    .day-number { font-size:2rem; font-weight:600; }
    .day-name   { font-size:0.9rem; opacity:0.7; }

    /* only the box that actually contains today gets the blue background */
    .today-box { background:var(--today-bg); }
  </style>
</head>

<body>
  <div id="widget">
    <i id="prevBtn" class="fa-solid fa-chevron-left nav"></i>

    <div class="day-box" id="prevDay">
      <div class="day-number">‑‑</div>
      <div class="day-name">Prev</div>
    </div>

    <div class="day-box" id="today">
      <div class="day-number">‑‑</div>
      <div class="day-name">Today</div>
    </div>

    <div class="day-box" id="nextDay">
      <div class="day-number">‑‑</div>
      <div class="day-name">Next</div>
    </div>

    <i id="nextBtn" class="fa-solid fa-chevron-right nav"></i>
  </div>

  <script>
    const ONE_DAY = 24 * 60 * 60 * 1000;

    function fmt(date) {
      return {
        number: date.getDate(),
        name: date.toLocaleDateString(undefined, { weekday: 'short' })
      };
    }

    // true if two Date objects represent the same calendar day
    function isSameDay(a, b) {
      return a.getFullYear() === b.getFullYear() &&
             a.getMonth()    === b.getMonth() &&
             a.getDate()     === b.getDate();
    }

    function render(base) {
      const prev = new Date(base.getTime() - ONE_DAY);
      const next = new Date(base.getTime() + ONE_DAY);
      const realToday = new Date();               // actual today

      const prevInfo  = fmt(prev);
      const todayInfo = fmt(base);
      const nextInfo  = fmt(next);

      // fill the three boxes
      document.querySelector('#prevDay .day-number').textContent = prevInfo.number;
      document.querySelector('#prevDay .day-name').textContent   = prevInfo.name;

      document.querySelector('#today .day-number').textContent = todayInfo.number;
      document.querySelector('#today .day-name').textContent   = todayInfo.name;

      document.querySelector('#nextDay .day-number').textContent = nextInfo.number;
      document.querySelector('#nextDay .day-name').textContent   = nextInfo.name;

      // ---- highlight the box that actually contains the real today ----
      // clear any previous highlight
      document.querySelectorAll('.day-box').forEach(el => el.classList.remove('today-box'));

      if (isSameDay(realToday, prev)) {
        document.getElementById('prevDay').classList.add('today-box');
      } else if (isSameDay(realToday, base)) {
        document.getElementById('today').classList.add('today-box');
      } else if (isSameDay(realToday, next)) {
        document.getElementById('nextDay').classList.add('today-box');
      }
    }

    let current = new Date();   // start with today
    render(current);

    // Arrow navigation – the blue box stays on the real today
    document.getElementById('prevBtn').addEventListener('click', () => {
      current = new Date(current.getTime() - ONE_DAY);
      render(current);
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
      current = new Date(current.getTime() + ONE_DAY);
      render(current);
    });
  </script>
</body>
</html>
