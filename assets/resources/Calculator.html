<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="applicationTitle" value="Calculator" />
<meta name="windowSize" value="270 470" />
<meta name="windowLocation" value="0 0" />
<meta name="windowBorderRadius" value="12" />
<meta name="topMost" value="false">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  :root {
    --mica-dark: rgba(20, 20, 20, 0.75);
    --text-color: #f0f0f0;
    --accent: rgba(240,240,240,0.2);
    --radius: 12px;
    --shadow: 0 10px 14px rgba(0,0,0,0.45);
    --backdrop-blur: 60px;
    --font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, sans-serif;
    --btn-bg: rgba(255,255,255,0.08);
    --btn-hover: rgba(255,255,255,0.15);
  }

  body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: transparent;
    font-family: var(--font-family);
    overflow: hidden;
  }

  .wrapper { padding: 10px; }

  .calculator {
    background: var(--mica-dark);
    backdrop-filter: blur(var(--backdrop-blur)) saturate(160%) brightness(0.9);
    -webkit-backdrop-filter: blur(var(--backdrop-blur)) saturate(160%) brightness(0.9);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    width: 220px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .display {
    background: rgba(255,255,255,0.05);
    border-radius: var(--radius);
    color: var(--text-color);
    padding: 8px;
    text-align: right;
    font-size: 1.5em;
    min-height: 40px;
    word-wrap: break-word;
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  .btn {
    background: var(--btn-bg);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius);
    color: var(--text-color);
    font-size: 1em;
    padding: 8px;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:hover { background: var(--btn-hover); }
  .btn:active { transform: scale(0.95); }

  .btn.operator { color: var(--accent); }
</style>
</head>

<body>
  <div class="wrapper">
    <div class="calculator" role="region" aria-label="Calculator Widget">
      <div class="display" id="calcDisplay">0</div>
      <div class="buttons">
        <div class="btn operator" data-value="C">C</div>
        <div class="btn operator" data-value="÷">÷</div>
        <div class="btn operator" data-value="×">×</div>
        <div class="btn operator" data-value="-">-</div>

        <div class="btn" data-value="7">7</div>
        <div class="btn" data-value="8">8</div>
        <div class="btn" data-value="9">9</div>
        <div class="btn operator" data-value="+">+</div>

        <div class="btn" data-value="4">4</div>
        <div class="btn" data-value="5">5</div>
        <div class="btn" data-value="6">6</div>
        <div class="btn operator" data-value="=">=</div>

        <div class="btn" data-value="1">1</div>
        <div class="btn" data-value="2">2</div>
        <div class="btn" data-value="3">3</div>
        <div class="btn" data-value=".">.</div>

        <div class="btn" data-value="0" style="grid-column: span 2;">0</div>
      </div>
    </div>
  </div>

  <script>
    const display = document.getElementById('calcDisplay');
    let currentInput = '';
    let lastOperator = '';
    let lastValue = '';

    function calculate(a, b, op) {
      a = parseFloat(a);
      b = parseFloat(b);
      switch(op) {
        case '+': return a + b;
        case '-': return a - b;
        case '×': return a * b;
        case '÷': return a / b;
      }
      return b;
    }

    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const val = btn.dataset.value;

        if(val === 'C') {
          currentInput = '';
          lastOperator = '';
          lastValue = '';
          display.textContent = '0';
        } else if(val === '=') {
          if(lastOperator && currentInput) {
            lastValue = calculate(lastValue, currentInput, lastOperator);
            display.textContent = lastValue;
            currentInput = '';
            lastOperator = '';
          }
        } else if(['+', '-', '×', '÷'].includes(val)) {
          if(currentInput) {
            if(lastValue) {
              lastValue = calculate(lastValue, currentInput, lastOperator);
            } else {
              lastValue = currentInput;
            }
            display.textContent = lastValue;
            currentInput = '';
          }
          lastOperator = val;
        } else {
          currentInput += val;
          display.textContent = currentInput;
        }
      });
    });
  </script>
</body>
</html>
