<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="applicationTitle" content="Keypress History">
  <meta name="windowSize" content="200 120">
  <meta name="windowLocation" content="0 0">

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

  <style>
    :root{
      --bg:#202020cc;
      --border:#2A2A2A;
      --hover:#0078D7;
      --text:#fff;
      --key-bg:#2d2d2d;
      --key-border:#444;
      --key-radius:6px;
      --bg-color: rgba(32, 32, 32, 0.95);
    }
    html,body{height:100%;margin:0;padding:0;overflow:hidden;}
    body{
      display:flex;align-items:center;justify-content:center;
      font-family:"Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
      color:var(--text);
    }
    #widget{
      width:200px;
      height:120px;
      border:2px solid var(--border);
      border-radius:12px;
      background:var(--bg-color);
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:.5rem;
      overflow:hidden;
      transition:border-color .2s;
    }
    #widget:hover{border-color:var(--hover);}

    #history{
      display:flex;
      gap:.4rem;
    }
    .key-box{
      width:48px;height:48px;line-height:48px;text-align:center;
      font-size:1.2rem;background:var(--key-bg);
      border:2px solid var(--key-border);border-radius:var(--key-radius);
      color:var(--text);box-shadow:0 2px 4px rgba(0,0,0,.3);
      flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
    }
    .placeholder{
      display:flex;
      flex-direction:column;
      align-items:center;
      color:var(--text);
      opacity:.6;
      font-size:.9rem;
    }
    .placeholder i{font-size:1.5rem;margin-bottom:.3rem;}
  </style>
</head>

<body>
  <div id="widget">
    <div id="history"></div>
  </div>

  <script>
    /* ---------- keycode → character map ---------- */
    const keyMap = {
      48:'0',49:'1',50:'2',51:'3',52:'4',53:'5',54:'6',55:'7',56:'8',57:'9',
      65:'a',66:'b',67:'c',68:'d',69:'e',70:'f',71:'g',72:'h',73:'i',74:'j',
      75:'k',76:'l',77:'m',78:'n',79:'o',80:'p',81:'q',82:'r',83:'s',84:'t',
      85:'u',86:'v',87:'w',88:'x',89:'y',90:'z'
    };

    /* ---------- fixed‑size queue (max 3) ---------- */
    class FixedQueue{
      constructor(limit){ this.limit = limit; this.items = []; }
      push(v){
        this.items.push(v);
        if (this.items.length > this.limit) this.items.shift();
      }
      get(){ return this.items; }
    }

    const q = new FixedQueue(3);
    const historyEl = document.getElementById('history');

    /* ---------- render ---------- */
    function render(){
      const items = q.get();
      if (items.length === 0) {
        historyEl.innerHTML = `
          <div class="placeholder">
            <i class="fa-solid fa-keyboard"></i>
            <span>No input yet</span>
          </div>`;
        return;
      }

      historyEl.innerHTML = items.map(ch=>`<div class="key-box">${ch}</div>`).join('');
    }

    /* ---------- unified callback ---------- */
    function GetCurrentKeyPressed(code){
      const ch = keyMap[code];
      if (!ch) return;               // ignore unknown keys
      q.push(ch);
      render();
    }

    /* ---------- polling ---------- */
    setInterval(()=>{
      window.chrome?.webview?.postMessage('GetCurrentKeyPressed');
    },100);

    // initial placeholder
    render();
  </script>
</body>
</html>
