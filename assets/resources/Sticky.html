<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="applicationTitle" content="Sticky Note">
  <meta name="windowSize" content="300 300">
  <meta name="windowLocation" content="0 0">
  <title>Sticky Notes</title>

  <style>
    @font-face{
      font-family:"Segoe UI";
      src:local("Segoe UI"),local("SegoeUI"),local("Segoe UI Variable");
    }
    :root{
      --yellow:#FFF9B1;
      --green:#C8E6C9;
      --blue:#BBDEFB;
      --red:#FFCDD2;
      --border:#777;
      --hover:#AAA;
    }
    html,body{height:100%;margin:0;padding:0;}
    body{
      display:flex;align-items:center;justify-content:center;
      font-family:"Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
    }
    #widget{
      width:100%;height:100%;max-width:300px;max-height:300px;
      border:2px solid var(--border);border-radius:12px;
      box-sizing:border-box;display:flex;flex-direction:column;
      background:#fff;overflow:hidden;
      transition:border-color .2s;
    }
    #widget:hover{border-color:var(--hover);}

    /* ---- scrollable tab bar (horizontal) ---- */
    .tabs{
      display:flex;
      background:#f0f0f0;
      border-bottom:1px solid var(--border);
      overflow-x:auto;          /* horizontal scroll when needed */
      overflow-y:hidden;
      scrollbar-width:thin;    /* Firefox */
    }
    .tabs::-webkit-scrollbar{
      height:6px;
    }
    .tabs::-webkit-scrollbar-thumb{
      background:#aaa;
      border-radius:3px;
    }

    .tab{
      flex:0 0 auto;            /* keep tabs from shrinking */
      padding:0.3rem 0.6rem;
      cursor:pointer;
      text-align:center;
      user-select:none;
      white-space:nowrap;
    }
    .tab.active{background:#fff;font-weight:600;}
    .tab:hover{background:#e0e0e0;}
    .close{margin-left:0.4rem;color:#555;font-weight:normal;}

    .palette{
      display:flex;gap:0.3rem;padding:0.3rem;
    }
    .color-swatch{
      width:1.2rem;height:1.2rem;border-radius:3px;cursor:pointer;
      border:2px solid transparent;
    }
    .color-swatch.selected{border-color:#000;}

    .note{
      flex:1;display:flex;flex-direction:column;
    }
    textarea{
      flex:1;resize:none;border:none;padding:0.5rem;
      background:transparent;font:inherit;color:#000;outline:none;
    }
    .footer{font-size:0.8rem;text-align:right;padding:0.2rem 0.5rem;opacity:0.6;}
  </style>
</head>

<body>
<div id="widget">
  <div class="tabs" id="tabBar"></div>

  <div class="palette" id="palette">
    <div class="color-swatch" data-color="var(--yellow)" style="background:var(--yellow)"></div>
    <div class="color-swatch" data-color="var(--green)"  style="background:var(--green)"></div>
    <div class="color-swatch" data-color="var(--blue)"   style="background:var(--blue)"></div>
    <div class="color-swatch" data-color="var(--red)"    style="background:var(--red)"></div>
  </div>

  <div class="note" id="noteContainer"></div>
</div>

<script>
/* ---------- Persistence ---------- */
const STORAGE_KEY = 'sticky-notes-state';
let notes = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];   // [{id,color,text}]
let nextId = notes.reduce((m,n)=>Math.max(m,n.id),0)+1;
let activeId = notes[0]?.id || null;

function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); }

/* ---------- Helpers ---------- */
function createNote(color='var(--yellow)'){
  const id = nextId++;
  notes.push({id, color, text:''});
  setActive(id);
  saveState();
}
function setActive(id){ activeId=id; renderTabs(); renderNote(); }
function getActive(){ return notes.find(n=>n.id===activeId); }

/* ---------- Render ---------- */
function renderTabs(){
  const bar = document.getElementById('tabBar');
  bar.innerHTML = '';
  notes.forEach(n=>{
    const tab = document.createElement('div');
    tab.className = 'tab' + (n.id===activeId?' active':'');
    tab.textContent = `Note ${n.id}`;
    tab.onclick = ()=>setActive(n.id);

    const close = document.createElement('span');
    close.className='close';
    close.textContent='✕';
    close.onclick = e=>{e.stopPropagation();closeNote(n.id);};
    tab.appendChild(close);
    bar.appendChild(tab);
  });
  const add = document.createElement('div');
  add.className='tab';
  add.textContent='+';
  add.onclick = ()=>createNote();
  bar.appendChild(add);
}
function renderNote(){
  const container = document.getElementById('noteContainer');
  container.innerHTML = '';
  const note = getActive();
  if(!note) return;

  container.style.background = note.color;

  const textarea = document.createElement('textarea');
  textarea.value = note.text;
  textarea.placeholder = 'Type your note…';
  textarea.oninput = ()=>{ note.text = textarea.value; saveState(); };
  container.appendChild(textarea);

  const footer = document.createElement('div');
  footer.className='footer';
  footer.textContent='🖊️';
  container.appendChild(footer);
}
function closeNote(id){
  notes = notes.filter(n=>n.id!==id);
  if(activeId===id) activeId = notes[0]?.id || null;
  saveState();
  renderTabs();
  renderNote();
}

/* ---------- Palette ---------- */
document.getElementById('palette').addEventListener('click', e=>{
  if(!e.target.classList.contains('color-swatch')) return;
  const color = e.target.dataset.color;
  const note = getActive();
  if(note){ note.color = color; renderNote(); saveState(); }
  document.querySelectorAll('.color-swatch')
          .forEach(s=>s.classList.toggle('selected',s===e.target));
});

/* ---------- Init ---------- */
if(notes.length===0) createNote();   // ensure at least one note
renderTabs();
renderNote();
</script>
</body>
</html>
