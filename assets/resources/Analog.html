<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="applicationTitle" content="Clock">
  <meta name="windowSize" content="210 210">
  <meta name="windowLocation" content="0 0">
  <title>Analog Clock</title>

  <style>
    :root{
      --bg-color:    rgba(32, 32, 32, 0.95);
      --border-color:#2A2A2A;
      --hover-border:#0078D7;
      --hand-color:#FFFFFF;
      --second-color:#FF5555;
      --mark-color:#CCCCCC;
    }

    html,body{
      margin:0;height:100%;display:flex;align-items:center;justify-content:center;      overflow: hidden;
    }

    #widget{
      background:var(--bg-color);
      width:200px;height:200px;
      border:3px solid var(--border-color);
      border-radius:50%;
      position:relative;
      overflow:hidden;
      transition:border-color .2s;
    }
    #widget:hover{border-color:var(--hover-border);}

    .dial{
      width:100%;height:100%;position:absolute;top:0;left:0;
      border-radius:50%;
      border:4px solid var(--hand-color);
      box-sizing:border-box;
    }

    /* hour & minute tick marks */
    .tick{
      position:absolute;top:50%;left:50%;
      transform-origin:0 0;
      background:var(--mark-color);
    }
    .hour-tick{
      width:4px;height:12px;
      border-radius:2px;
    }
    .minute-tick{
      width:2px;height:6px;
      border-radius:1px;
    }

    .hand{
      position:absolute;bottom:50%;left:50%;
      transform-origin:bottom center;
      background:var(--hand-color);
    }
    .hour  {width:5px;height:35%;border-radius:2.5px;}
    .minute{width:2px;height:45%;border-radius:1px;}
    .second{width:2px;height:65%;background:var(--second-color);}

    .center{
      width:12px;height:12px;background:var(--hand-color);
      border-radius:50%;position:absolute;top:50%;left:50%;
      transform:translate(-50%,-50%);
    }
  </style>
</head>
<body>
  <div id="widget">
    <div class="dial"></div>

    <!-- hour marks (12) -->
    <script>
      const widget = document.getElementById('widget');
      for (let i = 0; i < 12; i++) {
        const mark = document.createElement('div');
        mark.className = 'tick hour-tick';
        const angle = i * 30; // 360/12
        mark.style.transform = `rotate(${angle}deg) translate(-50%, -90%)`;
        widget.appendChild(mark);
      }
      // minute marks (60)
      for (let i = 0; i < 60; i++) {
        if (i % 5 === 0) continue; // skip where hour marks already exist
        const mark = document.createElement('div');
        mark.className = 'tick minute-tick';
        const angle = i * 6; // 360/60
        mark.style.transform = `rotate(${angle}deg) translate(-50%, -95%)`;
        widget.appendChild(mark);
      }
    </script>

    <div class="hand hour"   id="hourHand"></div>
    <div class="hand minute" id="minuteHand"></div>
    <div class="hand second" id="secondHand"></div>
    <div class="center"></div>
  </div>

  <script>
    const hourHand   = document.getElementById('hourHand');
    const minuteHand = document.getElementById('minuteHand');
    const secondHand = document.getElementById('secondHand');

    function updateClock() {
      const now = new Date();
      const sec  = now.getSeconds();
      const min  = now.getMinutes() + sec/60;
      const hour = now.getHours()%12 + min/60;

      secondHand.style.transform = `rotate(${sec * 6}deg)`;
      minuteHand.style.transform = `rotate(${min * 6}deg)`;
      hourHand.style.transform   = `rotate(${hour * 30}deg)`;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
