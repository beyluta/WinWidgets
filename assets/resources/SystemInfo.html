<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="applicationTitle" value="System Info" />
<meta name="windowSize" value="300 180" />
<meta name="windowLocation" value="0 0" />
<meta name="windowBorderRadius" value="20" />
<meta name="topMost" value="false">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  :root {
    --mica-dark: rgba(20, 20, 20, 0.75);
    --text-color: #f0f0f0;
    --radius: 20px;
    --backdrop-blur: 60px;
    --font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, sans-serif;
  }

  html, body {
    height: 100%;
    width: 100%;
    margin: 0;
    background: transparent;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-family);
    color: var(--text-color);
    overflow: hidden;
  }

  .widget {
    width: 100%;
    height: 100%;
    background: var(--mica-dark);
    backdrop-filter: blur(var(--backdrop-blur)) saturate(160%) brightness(0.9);
    -webkit-backdrop-filter: blur(var(--backdrop-blur)) saturate(160%) brightness(0.9);
    border-radius: var(--radius);
    border: 1px solid rgba(255, 255, 255, 0.05);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 1.2rem 1.6rem;
    box-sizing: border-box;
    gap: 14px;
  }

  .info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 1em;
  }

  .info i {
    font-size: 1.2em;
    margin-right: 10px;
    width: 22px;
  }

  .info-value {
    font-weight: 600;
    text-align: right;
    flex: 1;
  }
</style>
</head>

<body role="region" aria-label="System Info Widget">
  <div class="widget">
    <div class="info">
      <i class="fa-solid fa-desktop"></i>
      <span class="info-value" id="platform">--</span>
    </div>
    <div class="info">
      <i class="fa-solid fa-memory"></i>
      <span class="info-value" id="ram">--</span>
    </div>
    <div class="info">
      <i class="fa-solid fa-microchip"></i>
      <span class="info-value" id="cores">--</span>
    </div>
    <div class="info">
      <i class="fa-solid fa-battery-three-quarters" id="battery-icon"></i>
      <span class="info-value" id="battery">--%</span>
    </div>
  </div>

  <script>
    const platformEl = document.getElementById('platform');
    const ramEl = document.getElementById('ram');
    const coresEl = document.getElementById('cores');
    const batteryEl = document.getElementById('battery');
    const batteryIcon = document.getElementById('battery-icon');

    function updateSystemInfo() {
      platformEl.textContent = navigator.platform || 'N/A';
      ramEl.textContent = navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'N/A';
      coresEl.textContent = navigator.hardwareConcurrency || 'N/A';

      if (navigator.getBattery) {
        navigator.getBattery().then(battery => {
          const level = Math.round(battery.level * 100);
          batteryEl.textContent = level + '%';

          batteryIcon.className = 'fa-solid';
          if (level > 80) batteryIcon.classList.add('fa-battery-full');
          else if (level > 60) batteryIcon.classList.add('fa-battery-three-quarters');
          else if (level > 40) batteryIcon.classList.add('fa-battery-half');
          else if (level > 20) batteryIcon.classList.add('fa-battery-quarter');
          else batteryIcon.classList.add('fa-battery-empty');
        });
      } else {
        batteryEl.textContent = 'N/A';
      }
    }

    updateSystemInfo();
    setInterval(updateSystemInfo, 5000);
  </script>
</body>
</html>
