<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="applicationTitle" value="Clock" />
<meta name="windowSize" value="200 200" />
<meta name="windowLocation" value="0 0" />
<meta name="windowBorderRadius" value="50%" />
<meta name="topMost" value="false" />

<style>
  :root {
    --mica-dark: rgba(20, 20, 20, 0.75);
    --text-color: rgba(240, 240, 240, 0.95);
    --backdrop-blur: 70px;
    --accent: #00A4EF;
    --hand-hour: rgba(200, 200, 200, 0.9);
    --hand-minute: rgba(200, 200, 200, 0.7);
    --hand-second: rgba(0, 164, 239, 0.9);
  }

  html, body {
    margin: 0;
    height: 100%;
    width: 100%;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, sans-serif;
  }

  .clock {
    width: 95%;
    height: 95%;
    border-radius: 50%;
    background: var(--mica-dark);
    backdrop-filter: blur(var(--backdrop-blur)) saturate(160%) brightness(0.9);
    -webkit-backdrop-filter: blur(var(--backdrop-blur)) saturate(160%) brightness(0.9);
    border: 1px solid rgba(255, 255, 255, 0.05);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .hand {
    position: absolute;
    transform-origin: bottom center;
    bottom: 50%;
    left: 50%;
  }

  .hour {
    width: 6px;
    height: 60px;
    background: var(--hand-hour);
    border-radius: 3px;
  }

  .minute {
    width: 4px;
    height: 85px;
    background: var(--hand-minute);
    border-radius: 2px;
  }

  .second {
    width: 2px;
    height: 90px;
    background: var(--hand-second);
    border-radius: 1px;
  }

  .center-dot {
    position: absolute;
    width: 12px;
    height: 12px;
    background: var(--accent);
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
</style>
</head>

<body role="region" aria-label="Clock Widget">
  <div class="clock">
    <div class="hand hour" id="hour-hand"></div>
    <div class="hand minute" id="minute-hand"></div>
    <div class="hand second" id="second-hand"></div>
    <div class="center-dot"></div>
  </div>

  <script>
    function updateTime() {
      const now = new Date();
      const seconds = now.getSeconds();
      const minutes = now.getMinutes();
      const hours = now.getHours();

      const secondDeg = (seconds / 60) * 360;
      const minuteDeg = (minutes / 60 + seconds / 3600) * 360;
      const hourDeg = ((hours % 12) / 12 + minutes / 720) * 360;

      document.getElementById('second-hand').style.transform = `translate(-50%, 0) rotate(${secondDeg}deg)`;
      document.getElementById('minute-hand').style.transform = `translate(-50%, 0) rotate(${minuteDeg}deg)`;
      document.getElementById('hour-hand').style.transform = `translate(-50%, 0) rotate(${hourDeg}deg)`;
    }

    setInterval(updateTime, 1000);
    updateTime();
  </script>
</body>
</html>
