<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="applicationTitle" content="Digital Watch">
  <meta name="windowSize" content="200 120">
  <meta name="windowLocation" content="0 0">
  <title>Digital Clock</title>

  <!-- Font Awesome (optional – keep if you want an icon) -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

  <!-- UI font -->
  <style>
    @font-face {
      font-family: "Segoe UI";
      src: local("Segoe UI"), local("SegoeUI"), local("Segoe UI Variable");
      font-weight: 400;
      font-style: normal;
    }

    :root {
      --bg-color:    rgba(32, 32, 32, 0.95);
      --border-color:#2A2A2A;
      --hover-border:#0078D7;
      --text-color:  #FFFFFF;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-color);
      font-family: "Segoe UI", system-ui, -apple-system,
                   "Helvetica Neue", Arial, sans-serif;
    }

    #widget {
      width: 100%;
      height: 100%;
      max-width: 200px;   /* matches windowSize width */
      max-height: 120px;  /* matches windowSize height */
      border: 2px solid var(--border-color);
      border-radius: var(--windowBorderRadius, 12px);
      box-sizing: border-box;
      background: var(--bg-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: border-color .2s ease;
    }

    #widget:hover { border-color: var(--hover-border); }

    #time {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
  </style>
</head>

<body>
  <div id="widget">
    <div id="time">--:--:--</div>
  </div>

  <script>
    // Pad single‑digit numbers with a leading zero
    const pad = n => n.toString().padStart(2, '0');

    function updateClock() {
      const now = new Date();
      const h = pad(now.getHours());
      const m = pad(now.getMinutes());
      const s = pad(now.getSeconds());
      document.getElementById('time').textContent = `${h}:${m}:${s}`;
    }

    // Initial render then every second
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
