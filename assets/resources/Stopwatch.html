<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="applicationTitle" value="Stopwatch" />
<meta name="windowSize" value="420 250" />
<meta name="windowLocation" value="0 0" />
<meta name="windowBorderRadius" value="12" />
<meta name="topMost" value="true" />

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  :root {
    --mica-dark: rgba(20, 20, 20, 0.75); /* matched to clock */
    --text-color: rgba(240, 240, 240, 0.95);
    --text-dim: rgba(240, 240, 240, 0.6);
    --font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, sans-serif;
    --radius: 12px;
    --shadow: 0 12px 12px rgba(0,0,0,0.33);
    --backdrop-blur: 70px; /* stronger blur like clock */
  }

  body {
    font-family: var(--font-family);
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: transparent;
    overflow: hidden;
  }

  .wrapper {
    padding: 40px; /* more space for shadow */
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .widget {
    background: var(--mica-dark);
    backdrop-filter: blur(var(--backdrop-blur)) saturate(160%) brightness(0.9);
    -webkit-backdrop-filter: blur(var(--backdrop-blur)) saturate(160%) brightness(0.9);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 30px;
    width: 260px;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 16px;
    border: 1px solid rgba(255, 255, 255, 0.05);
  }

  .time {
    font-size: 2.4em;
    font-weight: 600;
    color: var(--text-color);
    text-shadow: 0 0 10px rgba(0,0,0,0.7);
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 14px;
  }

  .btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50%;
    width: 48px;
    height: 48px;
    color: var(--text-color);
    cursor: pointer;
    transition: background 0.2s, transform 0.1s, border 0.2s;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 1.3em;
  }

  .btn:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.2);
  }

  .btn:active {
    transform: scale(0.95);
    background: rgba(255,255,255,0.18);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Neutral monochrome icons */
  .btn.start i,
  .btn.stop i,
  .btn.reset i {
    color: rgba(255, 255, 255, 0.85);
  }
</style>
</head>

<body>
  <div class="wrapper">
    <div class="widget" role="region" aria-label="Stopwatch Widget">
      <div class="time" id="display">00:00.00</div>
      <div class="controls">
        <button class="btn start" id="startBtn" title="Start"><i class="fa-solid fa-play"></i></button>
        <button class="btn stop" id="stopBtn" title="Stop" disabled><i class="fa-solid fa-pause"></i></button>
        <button class="btn reset" id="resetBtn" title="Reset" disabled><i class="fa-solid fa-rotate-right"></i></button>
      </div>
    </div>
  </div>

  <script>
    let startTime = 0;
    let elapsedTime = 0;
    let timerInterval;

    const display = document.getElementById('display');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');

    function formatTime(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
      const seconds = (totalSeconds % 60).toString().padStart(2, '0');
      const centiseconds = Math.floor((ms % 1000) / 10).toString().padStart(2, '0');
      return `${minutes}:${seconds}.${centiseconds}`;
    }

    function updateDisplay() {
      const now = Date.now();
      const diff = now - startTime + elapsedTime;
      display.textContent = formatTime(diff);
    }

    startBtn.addEventListener('click', () => {
      startTime = Date.now();
      timerInterval = setInterval(updateDisplay, 10);
      startBtn.disabled = true;
      stopBtn.disabled = false;
      resetBtn.disabled = true;
    });

    stopBtn.addEventListener('click', () => {
      clearInterval(timerInterval);
      elapsedTime += Date.now() - startTime;
      startBtn.disabled = false;
      stopBtn.disabled = true;
      resetBtn.disabled = false;
    });

    resetBtn.addEventListener('click', () => {
      clearInterval(timerInterval);
      startTime = 0;
      elapsedTime = 0;
      display.textContent = '00:00.00';
      startBtn.disabled = false;
      stopBtn.disabled = true;
      resetBtn.disabled = true;
    });
  </script>
</body>
</html>
