<!DOCTYPE html>
<html>
<head>
  <!--

  <meta name="applicationTitle" content="Weather Widget" />
  <meta name="windowSize" content="320 240" />
  <meta name="windowBorderRadius" content="15" />
  <meta name="previewSize" content="320 240" />
  <meta name="windowOpacity" content="220" />
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />
</head>
<body>
  <div class="weather-container">
    <div class="weather-header">
      <i class="fas fa-cloud-sun weather-icon" id="weatherIcon"></i>
      <div class="location" id="location">New York</div>
    </div>
    
    <div class="temperature-section">
      <div class="main-temp" id="temperature">22°</div>
      <div class="weather-desc" id="description">Partly Cloudy</div>
    </div>
    
    <div class="weather-details">
      <div class="detail-item">
        <i class="fas fa-eye"></i>
        <span id="humidity">65%</span>
      </div>
      <div class="detail-item">
        <i class="fas fa-wind"></i>
        <span id="windSpeed">12 km/h</span>
      </div>
      <div class="detail-item">
        <i class="fas fa-thermometer-half"></i>
        <span id="feelsLike">25°</span>
      </div>
    </div>
  </div>
</body>
</html>

<script>
  // Simulate weather data (in a real implementation, you'd fetch from an API)
  function updateWeather() {
    const weatherConditions = [
      { icon: "fas fa-sun", temp: "28°", desc: "Sunny", humidity: "45%", wind: "8 km/h", feels: "30°" },
      { icon: "fas fa-cloud-sun", temp: "22°", desc: "Partly Cloudy", humidity: "65%", wind: "12 km/h", feels: "25°" },
      { icon: "fas fa-cloud-rain", temp: "18°", desc: "Light Rain", humidity: "85%", wind: "15 km/h", feels: "16°" },
      { icon: "fas fa-cloud", temp: "20°", desc: "Cloudy", humidity: "70%", wind: "10 km/h", feels: "22°" }
    ];
    
    const randomWeather = weatherConditions[Math.floor(Math.random() * weatherConditions.length)];
    
    document.getElementById("weatherIcon").className = randomWeather.icon + " weather-icon";
    document.getElementById("temperature").textContent = randomWeather.temp;
    document.getElementById("description").textContent = randomWeather.desc;
    document.getElementById("humidity").textContent = randomWeather.humidity;
    document.getElementById("windSpeed").textContent = randomWeather.wind;
    document.getElementById("feelsLike").textContent = randomWeather.feels;
  }

  // Update weather every 30 seconds
  updateWeather();
  setInterval(updateWeather, 30000);

  // Update time-based greeting
  function updateLocation() {
    const hours = new Date().getHours();
    let timeGreeting;
    
    if (hours < 12) timeGreeting = "Morning";
    else if (hours < 18) timeGreeting = "Afternoon";
    else timeGreeting = "Evening";
    
    document.getElementById("location").textContent = `Good ${timeGreeting}`;
  }
  
  updateLocation();
  setInterval(updateLocation, 60000);
</script>
